version: "3.8"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
    - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
    - DATABASE_URL=sqlite:///agenda.db
    - AGENDA_API_URL=http://localhost:5000/api/agendamentos
    - AGENDA_API_TIMEOUT=5
    volumes:
      - agenda_data:/app/instance

volumes:
  agenda_data: